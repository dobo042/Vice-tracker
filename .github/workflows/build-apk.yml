name: Build APK

on:
  push:
    branches: ["**"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: gradle

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Generate Gradle wrapper
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.7-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/
          cd android && /tmp/gradle-8.7/bin/gradle wrapper --gradle-version 8.7
          chmod +x gradlew

      - name: Generate debug keystore
        run: |
          keytool -genkey -v \
            -keystore android/app/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Generate launcher icons
        run: |
          sudo apt-get install -y imagemagick
          for size_dir in "48:mipmap-mdpi" "72:mipmap-hdpi" "96:mipmap-xhdpi" "144:mipmap-xxhdpi" "192:mipmap-xxxhdpi"; do
            size="${size_dir%%:*}"
            dir="${size_dir##*:}"
            dest="android/app/src/main/res/${dir}"
            mkdir -p "$dest"
            convert -size "${size}x${size}" xc:#6200EE "${dest}/ic_launcher.png"
            convert -size "${size}x${size}" xc:#6200EE "${dest}/ic_launcher_round.png"
          done

      - name: Create assets directory
        run: mkdir -p android/app/src/main/assets

      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon
        env:
          JAVA_OPTS: "-Xmx4g"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: vice-tracker-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
